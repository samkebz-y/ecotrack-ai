<!DOCTYPE html>
<html>
<head>
  <title>EcoTrack AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌍 EcoTrack AI</h1>
    <p>Track your daily carbon footprint</p>

    <div class="card">
      <label>🚗 Km traveled by car (per day)</label>
      <input type="number" id="carKm">

      <label>🍖 Meat meals per week</label>
      <input type="number" id="meatMeals">

      <label>💡 Electricity hours per day</label>
      <input type="number" id="electricityHours">

      <button onclick="calculateScore()">Calculate My Impact</button>

      <div id="result"></div>
      <div id="aiSuggestion"></div>
    </div>
  </div>

  <script src="scripts/script.js"></script>
</body>
</html>
